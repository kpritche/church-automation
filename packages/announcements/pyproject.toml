[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "church-automation-announcements"
version = "0.1.0"
description = "Generate ProPresenter announcement slides from Gmail"
readme = "README.md"
requires-python = ">=3.9"
authors = [
    {name = "Church Automation", email = "contact@example.com"}
]
dependencies = [
    "church-automation-shared",
    "google-api-python-client>=2.0.0",
    "google-auth>=2.0.0",
    "google-auth-httplib2>=0.1.0",
    "google-auth-oauthlib>=1.0.0",
    "google-genai>=0.1.0",
    "beautifulsoup4>=4.12.0",
    "qrcode[pil]>=7.4.0",
    "pillow>=10.0.0",
    "requests>=2.31.0",
    "protobuf>=4.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
]

[project.scripts]
make-announcements = "announcements_app.main_probundle:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["announcements_app*"]
