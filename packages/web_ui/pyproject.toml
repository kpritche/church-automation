[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "church-automation-web-ui"
version = "0.1.0"
description = "Web UI for church automation tools"
readme = "README.md"
requires-python = ">=3.9"
authors = [
    {name = "Church Automation", email = "contact@example.com"}
]
dependencies = [
    "church-automation-shared",
    "church-automation-announcements",
    "church-automation-slides",
    "church-automation-bulletins",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.6",
    "jinja2>=3.1.0",
    "aiofiles>=23.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
]

[project.scripts]
serve-web-ui = "web_ui_app.server:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["web_ui_app*"]
